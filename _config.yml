###########################################################
# Name of website
title: Joe's Space

# Your name to show in the footer  
author: Joe Zhou

###############################################
# List of links in the navigation bar
###############################################

navbar-links:
  About Me: "aboutme"

#####################################
# Footer social media links
#####################################

social-network-links:
  email: "hemingzhouhans@hotmail.com"
  github: zhoujoe2014
  linkedin: heming-zhou
  rss: true

# RSS feed description
rss-description: Joe's personal website

###########################
# General options
###########################

# URL for the footer link
url-pretty: "joezhou2014.github.io"

# Add website title to all pages
title-on-all-pages: true

# Excerpt length
excerpt_length: 50

# Show excerpts
feed_show_excerpt: true

# Show tags
feed_show_tags: true

# Search button
post_search: true

# Edit page button
edit_page_button: true

######################################
# Colours
######################################

page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"
footer-hover-col: "#0085A1"

################
# Misc
################

date_format: "%B %-d, %Y"

#################################################################################

timezone: "America/Toronto"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - LICENSE
  - README.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
