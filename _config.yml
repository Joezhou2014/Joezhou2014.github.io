###########################################################
# Name of website
title: Heming Zhou | Data-Driven Healthcare Professional

# Your name to show in the footer  
author: Heming Zhou

###############################################
# List of links in the navigation bar
###############################################

navbar-links:
  About Me: "aboutme"

#####################################
# Footer social media links
#####################################

social-network-links:
  email: "hemingzhouhans@hotmail.com"
  github: zhoujoe2014
  linkedin: heming-zhou
  rss: true

# RSS feed description
rss-description: Personal website of Heming Zhou

###########################
# General options
###########################

# URL for the footer link
url-pretty: "joezhou2014.github.io"

# Add website title to all pages
title-on-all-pages: true

# Excerpt length
excerpt_length: 50

# Show excerpts
feed_show_excerpt: true

# Show tags
feed_show_tags: true

# Search button
post_search: true

# Edit page button
edit_page_button: true

######################################
# Professional Dark Theme - Financial Elite Style
######################################

# Page background - clean white
page-col: "#FFFFFF"

# Primary text - dark charcoal for professionalism
text-col: "#2C3E50"

# Link color - sophisticated navy blue
link-col: "#1A5276"

# Hover color - elegant gold accent
hover-col: "#B7950B"

# Navigation bar - dark professional
navbar-col: "#1A252F"

# Navigation text - light for contrast
navbar-text-col: "#ECF0F1"

# Navigation border
navbar-border-col: "#2C3E50"

# Footer - dark professional
footer-col: "#1A252F"

# Footer text
footer-text-col: "#BDC3C7"

# Footer links
footer-link-col: "#ECF0F1"

# Footer hover - gold accent
footer-hover-col: "#B7950B"

################
# Misc
################

date_format: "%B %-d, %Y"

#################################################################################

timezone: "America/Toronto"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
      social-share: true
  -
    scope:
      path: ""
    values:
      layout: "page"

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - LICENSE
  - README.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
